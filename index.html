<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>模拟器测试</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/dist/reveal.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/dist/theme/white.min.css">
  <style>
    body {
      background: #1a1a2e;
    }
    .reveal {
      font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", "Segoe UI", Roboto, sans-serif;
    }
    .reveal .slides {
      text-align: center;
    }
    .reveal .slides img {
      max-width: 100%;
      max-height: 80vh;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .reveal .footer {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      z-index: 10;
    }
    .reveal .slide-number {
      background: rgba(0,0,0,0.4);
      color: #fff;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 14px;
    }
    .nav-hint {
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="reveal">
    <div class="slides">
      <section><img src="images/slide1.jpg" alt="Slide 1"></section>
      <section><img src="images/slide2.jpg" alt="Slide 2"></section>
      <section><img src="images/slide3.jpg" alt="Slide 3"></section>
      <section><img src="images/slide4.jpg" alt="Slide 4"></section>
    </div>
    <div class="footer">模拟器测试 · 4 页</div>
  </div>
  <div class="nav-hint">← → 键或点击导航</div>
  
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/dist/reveal.min.js"></script>
  <script>
    Reveal.initialize({
      hash: true,
      slideNumber: 'c/t',
      showSlideNumber: 'all',
      transition: 'slide',
      transitionSpeed: 'default',
      backgroundTransition: 'fade',
      center: true,
      controls: true,
      progress: true,
      history: true,
      keyboard: true,
      touch: true,
      loop: false,
      rtl: false,
      navigationMode: 'linear',
      shuffle: false,
      fragments: true,
      fragmentInURL: false,
      embedded: false,
      help: true,
      showNotes: false,
      autoPlayMedia: null,
      preloadIframes: null,
      autoSlide: 0,
      autoSlideStoppable: true,
    });
  </script>
</body>
</html>
